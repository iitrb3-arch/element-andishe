name: APK (Fdroid arm64 only)
on:
  push:
    paths:
      - 'vector-app/**'
      - '.github/workflows/apk.yml'
  workflow_dispatch:
concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true
env:
  HS_URL: https://edu97.ir
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3072m -Dfile.encoding=UTF-8"
  CI_GRADLE_ARG_PROPERTIES: --stacktrace --max-workers 2 --no-daemon
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: gradle/actions/setup-gradle@v3
      - name: Set default homeserver
        run: |
          mkdir -p vector-app/src/main/assets
          cat > vector-app/src/main/assets/vector_config.json <<EOF2
          { "defaultHomeserverUrl": "${HS_URL}" }
          EOF2
      - name: Build Fdroid Debug
        run: ./gradlew :vector-app:assembleFdroidDebug $CI_GRADLE_ARG_PROPERTIES
      - name: Upload APK (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-debug-arm64
          path: vector-app/build/outputs/apk/fdroid/debug/*arm64-v8a*.apk
          if-no-files-found: error
